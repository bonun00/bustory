name: Frontend Deploy (Vite + React → Nginx on EC2)

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

env:
  FRONTEND_DIR: .
  BUILD_DIR: dist

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            **/package-lock.json

      - name: Install & Build (Vite)
        working-directory: ${{ env.FRONTEND_DIR }}
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
          npm run build
          echo "---- dist tree ----"
          ls -la ${{ env.BUILD_DIR }}

      # 🔹 러너 퍼블릭 IP 확인
      - name: Get runner egress IP
        id: ip
        run: echo "ip=$(curl -s https://checkip.amazonaws.com)" >> $GITHUB_OUTPUT

      # 🔹 AWS 자격 구성 (OIDC 권장: role-to-assume 사용 / Access Key 사용시 주석 변경)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }} # 예: ap-northeast-2
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          # access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          # secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # 🔹 보안그룹에 러너 IP 임시 허용 (22/tcp)
      - name: Allow SSH from runner IP
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.SG_ID }} \
            --protocol tcp --port 22 \
            --cidr ${{ steps.ip.outputs.ip }}/32 \
          || true

      # 원격 업로드 폴더 보장
      - name: Ensure remote upload dir
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 10m
          script: mkdir -p /home/${{ secrets.EC2_USER }}/upload/frontend

      # dist 전체 업로드
      - name: Upload dist/ to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          source: ${{ env.FRONTEND_DIR }}/${{ env.BUILD_DIR }}/**
          target: /home/${{ secrets.EC2_USER }}/upload/frontend
          overwrite: true
          strip_components: 0

      # 릴리즈 전환 + 권한 조정 + Nginx 리로드
      - name: Activate on Nginx
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 15m
          script: |
            set -euo pipefail
            RELEASE_ID=$(date +%Y%m%d%H%M%S)
            sudo mkdir -p /var/www/bus/releases/${RELEASE_ID}
            sudo cp -r /home/${{ secrets.EC2_USER }}/upload/frontend/* /var/www/bus/releases/${RELEASE_ID}/
            sudo ln -sfnT /var/www/bus/releases/${RELEASE_ID} /var/www/bus/current
            sudo chown -R www-data:www-data /var/www/bus
            ls -1dt /var/www/bus/releases/* | tail -n +6 | xargs -r sudo rm -rf
            sudo nginx -t && sudo systemctl reload nginx

      # 🔹 항상 규칙 제거 (성공/실패 무관)
      - name: Revoke SSH rule
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.SG_ID }} \
            --protocol tcp --port 22 \
            --cidr ${{ steps.ip.outputs.ip }}/32 \
          || true