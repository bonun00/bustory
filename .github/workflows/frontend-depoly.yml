name: Frontend Deploy (Vite + React έΗΤ Nginx on EC2)

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

env:
  FRONTEND_DIR: .
  BUILD_DIR: dist

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Node ΉΕνΉ╣α (LTS Ά╢ΝΉηξ)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            **/package-lock.json

      # ΉΕνΉ╣α & Έ╣ΝΈΥε
      - name: Install & Build (Vite)
        working-directory: ${{ env.FRONTEND_DIR }}
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
          npm run build
          echo "---- dist tree ----"
          ls -la ${{ env.BUILD_DIR }}

      # ΉδΡΆ▓σ ΉΩΖΈκεΈΥε ΊΠ┤ΈΞΦ Έ│┤Ήηξ
      - name: Ensure remote upload dir
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}            # έΗΡ key_path ΈΝΑΉΜι key ΉΓυΉγσ (Ά╢ΝΉηξ)
          port: 22
          script: mkdir -p /home/${{ secrets.EC2_USER }}/upload/frontend

      # dist ΉιΕΉ▓┤ ΉΩΖΈκεΈΥε
      - name: Upload dist/ to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}            # έΗΡ key ΉΓυΉγσ έΗΤ permission denied Έ░σΉπΑ
          port: 22
          source: ${{ env.FRONTEND_DIR }}/${{ env.BUILD_DIR }}/**   # distΉζα ΈςρΈΥι ΊΝΝΉζ╝/ΊΠ┤ΈΞΦ
          target: /home/${{ secrets.EC2_USER }}/upload/frontend
          overwrite: true
          strip_components: 0

      # Έο┤ΈουΉοΙ ΉιΕΊβα + Ά╢ΝΊΧε Ήκ░ΉιΧ + Nginx ΈουΈκεΈΥε
      - name: Activate on Nginx
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          script: |
            set -euo pipefail
            RELEASE_ID=$(date +%Y%m%d%H%M%S)
            sudo mkdir -p /var/www/bus/releases/${RELEASE_ID}
            sudo cp -r /home/${{ secrets.EC2_USER }}/upload/frontend/* /var/www/bus/releases/${RELEASE_ID}/
            sudo ln -sfnT /var/www/bus/releases/${RELEASE_ID} /var/www/bus/current
            sudo chown -R www-data:www-data /var/www/bus
            # ΉανΈηαΈΡε Έο┤ΈουΉοΙ 5Ά░εΈπΝ ΈΓρΆ╕░Ά╕░
            ls -1dt /var/www/bus/releases/* | tail -n +6 | xargs -r sudo rm -rf
            sudo nginx -t && sudo systemctl reload nginx