name: Frontend Deploy (Vite + React → Nginx on EC2)

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

# 🔸 OIDC로 STS AssumeRole 하려면 필요
permissions:
  id-token: write
  contents: read

env:
  FRONTEND_DIR: .
  BUILD_DIR: dist

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            **/package-lock.json

      - name: Install & Build (Vite)
        working-directory: ${{ env.FRONTEND_DIR }}
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
          npm run build
          echo "---- dist tree ----"
          ls -la ${{ env.BUILD_DIR }}

      - name: Get runner egress IP
        id: ip
        run: echo "ip=$(curl -s https://checkip.amazonaws.com)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Allow SSH from runner IP
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.SG_ID }} \
            --protocol tcp --port 22 \
            --cidr ${{ steps.ip.outputs.ip }}/32 \
          || true

      - name: Ensure remote upload dir
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          timeout: 120s
          command_timeout: 10m
          script: mkdir -p /home/${{ secrets.EC2_USER }}/upload/frontend

      # ⬇️ dist/** 올리되, dist 상위 폴더는 제거(=파일/하위폴더만 전송)
      - name: Upload dist/ to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          source: ${{ env.BUILD_DIR }}/**     # ex) dist/**
          target: /home/${{ secrets.EC2_USER }}/upload/frontend
          overwrite: true
          strip_components: 1                 # ✅ dist/ 제거하고 내부만 복사

      - name: Activate on Nginx
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          timeout: 120s
          command_timeout: 15m
          script: |
            set -euo pipefail
            RELEASE_ID=$(date +%Y%m%d%H%M%S)
            sudo mkdir -p /var/www/bus/releases/${RELEASE_ID}
            # dist/** 내부만 /upload/frontend 에 있으므로 바로 복사
            sudo cp -r /home/${{ secrets.EC2_USER }}/upload/frontend/* /var/www/bus/releases/${RELEASE_ID}/
            sudo ln -sfnT /var/www/bus/releases/${RELEASE_ID} /var/www/bus/current
            sudo chown -R www-data:www-data /var/www/bus
            ls -1dt /var/www/bus/releases/* | tail -n +6 | xargs -r sudo rm -rf
            sudo nginx -t && sudo systemctl reload nginx

      - name: Revoke SSH rule
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.SG_ID }} \
            --protocol tcp --port 22 \
            --cidr ${{ steps.ip.outputs.ip }}/32 \
          || true