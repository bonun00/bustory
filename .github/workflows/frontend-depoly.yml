name: Frontend Deploy (Vite + React → Nginx on EC2)

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

env:
  FRONTEND_DIR: .
  BUILD_DIR: dist

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show lockfiles (debug)
        run: |
          pwd && ls -la
          test -f package-lock.json && echo "root lock found"

      - name: Setup Node (npm cache w/ lockfile)
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: |
            **/package-lock.json       # ← 경로 이슈 방지

      - name: Ensure lockfile exists
        run: |
          test -f package-lock.json || (echo "❌ package-lock.json not found at repo root" && exit 1)

      - name: Install & Build (Vite)
        working-directory: ${{ env.FRONTEND_DIR }}
        run: |
          npm ci
          npm run build
          echo "---- dist tree ----"
          ls -la ${{ env.BUILD_DIR }}

      # SSH 키 파일로 저장 (멀티라인 안전)
      - name: Write SSH key
        run: |
          echo "${{ secrets.EC2_KEY }}" > key.pem
          chmod 600 key.pem

      # 원격 업로드 폴더 보장
      - name: Ensure remote upload dir
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key_path: key.pem
          script: mkdir -p /home/${{ secrets.EC2_USER }}/upload/frontend

      - name: Upload dist/ to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key_path: key.pem
          source: ${{ env.FRONTEND_DIR }}/${{ env.BUILD_DIR }}/**
          target: /home/${{ secrets.EC2_USER }}/upload/frontend
          overwrite: true

      - name: Activate on Nginx
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key_path: key.pem
          script: |
            set -e
            RELEASE_ID=$(date +%Y%m%d%H%M%S)
            sudo mkdir -p /var/www/bus/releases/${RELEASE_ID}
            sudo cp -r /home/${{ secrets.EC2_USER }}/upload/frontend/* /var/www/bus/releases/${RELEASE_ID}/
            sudo ln -sfn /var/www/bus/releases/${RELEASE_ID} /var/www/bus/current
            ls -1dt /var/www/bus/releases/* | tail -n +6 | xargs -r sudo rm -rf
            sudo nginx -t && sudo systemctl reload nginx