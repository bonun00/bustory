name: Frontend Deploy (Vite + React → Nginx on EC2)

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

env:
  FRONTEND_DIR: .
  BUILD_DIR: dist

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 디버그: lock 위치 확인
      - name: Show lockfiles
        run: |
          pwd && ls -la
          ls -la frontend || true
          test -f package-lock.json && echo "root lock found" || true
          test -f frontend/package-lock.json && echo "frontend lock found" || true

      # ✅ lock이 있으면 캐시 사용
      - name: Setup Node (with cache)
        if: ${{ hashFiles('package-lock.json', 'frontend/package-lock.json', '**/package-lock.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            **/package-lock.json

      # ✅ lock이 없으면 캐시 없이 진행 (에러 방지)
      - name: Setup Node (no cache)
        if: ${{ hashFiles('package-lock.json', 'frontend/package-lock.json', '**/package-lock.json') == '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 설치 & 빌드 (루트에 Vite)
      - name: Install & Build (Vite)
        working-directory: ${{ env.FRONTEND_DIR }}
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
          npm run build
          echo "---- dist tree ----"
          ls -la ${{ env.BUILD_DIR }}

      # SSH 키 파일 저장 (멀티라인 안전)
      - name: Write SSH key
        run: |
          echo "${{ secrets.EC2_KEY }}" > key.pem
          chmod 600 key.pem

      # 원격 업로드 폴더 보장
      - name: Ensure remote upload dir
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key_path: key.pem
          script: mkdir -p /home/${{ secrets.EC2_USER }}/upload/frontend

      # dist 업로드
      - name: Upload dist/ to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key_path: key.pem
          source: ${{ env.FRONTEND_DIR }}/${{ env.BUILD_DIR }}/**
          target: /home/${{ secrets.EC2_USER }}/upload/frontend
          overwrite: true

      # 릴리스 전환 + Nginx 리로드
      - name: Activate on Nginx
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key_path: key.pem
          script: |
            set -e
            RELEASE_ID=$(date +%Y%m%d%H%M%S)
            sudo mkdir -p /var/www/bus/releases/${RELEASE_ID}
            sudo cp -r /home/${{ secrets.EC2_USER }}/upload/frontend/* /var/www/bus/releases/${RELEASE_ID}/
            sudo ln -sfn /var/www/bus/releases/${RELEASE_ID} /var/www/bus/current
            ls -1dt /var/www/bus/releases/* | tail -n +6 | xargs -r sudo rm -rf
            sudo nginx -t && sudo systemctl reload nginx