name: Frontend Deploy (Vite + React → Nginx on EC2)

on:
  push:
    branches: [ main ]
    paths:
      - "frontend/**"

env:
  FRONTEND_DIR: frontend
  BUILD_DIR: dist

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

      - name: Install & Build (Vite)
        working-directory: ${{ env.FRONTEND_DIR }}
        run: |
          npm ci || npm install
          npm run build

      # dist를 EC2로 업로드
      - name: Upload frontend bundle to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: ${{ env.FRONTEND_DIR }}/${{ env.BUILD_DIR }}/**   # vite의 dist
          target: /home/${{ secrets.EC2_USER }}/upload/frontend
          overwrite: true

      - name: Activate release on EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e
            RELEASE_ID=$(date +%Y%m%d%H%M%S)
            sudo mkdir -p /var/www/bus/releases/${RELEASE_ID}
            sudo cp -r ~/upload/frontend/* /var/www/bus/releases/${RELEASE_ID}/
            sudo ln -sfn /var/www/bus/releases/${RELEASE_ID} /var/www/bus/current
            # 오래된 릴리스 5개만 유지
            ls -1dt /var/www/bus/releases/* | tail -n +6 | xargs -r sudo rm -rf
            sudo nginx -t && sudo systemctl reload nginx