name: CI/CD (Frontend → GHCR → EC2)

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

concurrency:
  group: fe-cicd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GHCR_USER: ${{ secrets.GHCR_USER }}   # PAT 소유자
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }} # read:packages 필요(EC2 pull용)
    steps:
      - uses: actions/checkout@v4

      # Node 빌드 (Vite)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Build (Vite)
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
          npm run build
          ls -la dist || true

      # GHCR 로그인 & 이미지 푸시
      - name: GHCR login (push)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push frontend image
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/bus-frontend:${{ github.sha }}"
          docker build -f Dockerfile.frontend -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      # (선택) SSH 키 파일로 저장
      - name: Write SSH key
        run: |
          echo "${{ secrets.EC2_KEY }}" > key.pem
          chmod 600 key.pem

      # EC2에서 pull & run (백엔드 방식과 동일)
      - name: Deploy frontend on EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key_path: key.pem
          port: 22
          timeout: 1m
          command_timeout: 15m
          script_stop: true
          debug: true
          envs: IMAGE,GHCR_USER,GHCR_TOKEN
          script: |
            echo "Deploying $IMAGE"
            bash ~/deploy_docker_frontend.sh "${IMAGE}"